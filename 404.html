<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* m-plus-1-code-500 - latin */
    @font-face {
      font-family: 'M PLUS 1 Code';
      font-style: normal;
      font-weight: 500;
      src: url('/font/m-plus-1-code-v7-latin-500.eot'); /* IE9 Compat Modes */
      src: local(''),
      url('/font/m-plus-1-code-v7-latin-500.eot?#iefix') format('embedded-opentype'), /* IE6-IE8 */
      url('/font/m-plus-1-code-v7-latin-500.woff2') format('woff2'), /* Super Modern Browsers */
      url('/font/m-plus-1-code-v7-latin-500.woff') format('woff'), /* Modern Browsers */
      url('/font/m-plus-1-code-v7-latin-500.ttf') format('truetype') /* Safari, Android, iOS */
    }
    * {
      font-family: "M PLUS 1 Code";
      line-height: 140%;
    }

    * {
      line-height: 1.2;
      margin: 0;
    }

    html {
      color: #888;
      display: table;
      font-family: sans-serif;
      height: 100%;
      text-align: center;
      width: 100%;
    }

    body {
      display: table-cell;
      vertical-align: middle;
      margin: 2em auto;
    }

    h1 {
      color: #555;
      font-size: 2em;
      font-weight: 400;
    }

    p {
      margin: 0 auto;
      width: 280px;
    }

    @media only screen and (max-width: 280px) {

      body,
      p {
        width: 95%;
      }

      h1 {
        font-size: 1.5em;
        margin: 0 0 0.3em;
      }

    }
  </style>
</head>

<body>
  <h1>Page Not Found</h1>
  <p>Sorry, but the page you were trying to view does not exist.<br> <a href="index.html">Back to Homepage</a></p>
</body>
<footer>
</footer>
</html>
